        {cat:"functional",ch:"吸音",py:"xī yīn",en:"sound-absorbing",def:"能吸收声波，减少回声",defEn:"can absorb sound waves, reducing echo",ex:"录音棚墙壁常使用吸音材料。Recording studios use sound-absorbing materials.",di:[{c:"吸",e:"absorb"},{c:"音",e:"sound"}]},
        // ========== 🔁 叠词 ABB ==========
        {cat:"reduplicative",ch:"硬邦邦",py:"yìng bāng bāng",en:"hard / stiff",def:"非常硬，没有弹性",defEn:"very hard, lacking elasticity",ex:"冻肉硬邦邦的。The frozen meat is rock hard.",di:[{c:"硬",e:"hard"},{c:"邦邦",e:"stiff"}]},
        {cat:"reduplicative",ch:"软塌塌",py:"ruǎn tā tā",en:"soft / limp / floppy",def:"过软无力，无法支撑",defEn:"excessively soft, can't hold shape",ex:"煮过头的面条软塌塌的。Overcooked noodles are limp.",di:[{c:"软",e:"soft"},{c:"塌塌",e:"collapsed"}]},
        {cat:"reduplicative",ch:"软绵绵",py:"ruǎn mián mián",en:"soft / fluffy",def:"柔软舒适（正面）",defEn:"pleasantly soft and fluffy",ex:"蛋糕软绵绵的。The cake is soft and fluffy.",di:[{c:"软",e:"soft"},{c:"绵绵",e:"fluffy"}]},
        {cat:"reduplicative",ch:"烂糊糊",py:"làn hū hū",en:"mushy / overcooked",def:"煮得过烂成糊状",defEn:"overcooked into a mushy state",ex:"青菜煮得烂糊糊的。The greens are cooked to mush.",di:[{c:"烂",e:"mushy"},{c:"糊糊",e:"paste"}]},
        {cat:"reduplicative",ch:"脆生生",py:"cuì shēng shēng",en:"crispy / fresh",def:"清脆爽口",defEn:"pleasantly crisp and fresh",ex:"黄瓜脆生生的。The cucumber is crisp and fresh.",di:[{c:"脆",e:"crisp"},{c:"生生",e:"fresh"}]},
        {cat:"reduplicative",ch:"油汪汪",py:"yóu wāng wāng",en:"oily / greasy-looking",def:"油光发亮",defEn:"glistening with oil",ex:"炒饭油汪汪的。The fried rice glistens with oil.",di:[{c:"油",e:"oil"},{c:"汪汪",e:"glistening"}]},
        {cat:"reduplicative",ch:"干巴巴",py:"gān bā bā",en:"dry / parched",def:"缺乏水分和油脂",defEn:"lacking moisture and oil",ex:"干面包干巴巴的。The dry bread is parched.",di:[{c:"干",e:"dry"},{c:"巴巴",e:"parched"}]},
        {cat:"reduplicative",ch:"湿漉漉",py:"shī lù lù",en:"soaking wet",def:"充满水分、往下滴水",defEn:"full of water, dripping wet",ex:"头发湿漉漉的。My hair is soaking wet.",di:[{c:"湿",e:"wet"},{c:"漉漉",e:"dripping"}]},
        {cat:"reduplicative",ch:"滑溜溜",py:"huá liū liū",en:"slippery / slick",def:"非常滑，难以抓住",defEn:"extremely slippery",ex:"泥鳅滑溜溜的。The loach is slippery.",di:[{c:"滑",e:"slippery"},{c:"溜溜",e:"slick"}]},
        {cat:"reduplicative",ch:"紧绷绷",py:"jǐn bēng bēng",en:"tight / taut",def:"拉得很紧，没有松弛",defEn:"stretched tight, no slack",ex:"新鞋紧绷绷的。The new shoes are tight.",di:[{c:"紧",e:"tight"},{c:"绷绷",e:"taut"}]},
        {cat:"reduplicative",ch:"柴巴巴",py:"chái bā bā",en:"dry and fibrous",def:"肉干柴无汁",defEn:"meat that is dry and stringy",ex:"鸡胸肉煮过头柴巴巴的。Overcooked chicken breast is dry.",di:[{c:"柴",e:"stringy"},{c:"巴巴",e:"parched"}]},
        {cat:"reduplicative",ch:"面乎乎",py:"miàn hū hū",en:"mealy / floury",def:"口感像面粉、不脆",defEn:"texture like flour, not crisp",ex:"这个苹果面乎乎的。This apple is mealy.",di:[{c:"面",e:"mealy"},{c:"乎乎",e:"mushy"}]}
    ];

    const catLabels = {
        "all":"🖐️ All","universal":"📋 通用 Universal","surface":"📐 表面 Surface","fabric":"🧶 织物 Fabric",
        "liquid":"💧 液体 Liquid","food":"🍜 食物 Food","tofu":"🧈 豆腐 Tofu","meat":"🥩 肉类 Meat",
        "fruit":"🍰 水果甜点 Fruit/Dessert","structure":"🏗️ 结构 Structure","material":"🔧 材料 Materials",
        "visual":"👁️ 视觉 Visual","dynamic":"⚡ 动态 Dynamic","static":"🧊 静态感官 Static",
        "skincare":"💆 护肤 Skincare","functional":"🛡️ 功能 Functional","reduplicative":"🔁 叠词 ABB"
    };

    // ========================================
    // IMAGE PATHS
    // ========================================
    const categoryImages = {
        "all": "images/textures-all.png",
        "universal": "images/textures-universal.png",
        "surface": "images/textures-surface.png",
        "fabric": "images/textures-fabric.png",
        "liquid": "images/textures-liquid.png",
        "food": "images/textures-food.png",
        "tofu": "images/textures-tofu.png",
        "meat": "images/textures-meat.png",
        "fruit": "images/textures-fruit.png",
        "structure": "images/textures-structure.png",
        "material": "images/textures-material.png",
        "visual": "images/textures-visual.png",
        "dynamic": "images/textures-dynamic.png",
        "static": "images/textures-static.png",
        "skincare": "images/textures-skincare.png",
        "functional": "images/textures-functional.png",
        "reduplicative": "images/textures-reduplicative.png"
    };

    const tbl=document.getElementById('dynamicTableContainer');
    const gal=document.getElementById('puzzleGallery');
    const imgLbl=document.getElementById('imageLabel');
    const imageSlot=document.getElementById('categoryImageSlot');

    function updateCategoryImage(cat) {
        const imagePath = categoryImages[cat];
        const label = catLabels[cat] || cat;
        if (imagePath) {
            imageSlot.innerHTML = `
                <img src="${imagePath}" 
                     alt="${label}" 
                     style="max-width:100%; max-height:350px; border-radius:1.5rem; object-fit:contain;"
                     onerror="this.style.display='none'; this.parentElement.innerHTML='<span>🖼️ ' + '${label}' + ' — 图片未找到 (Image not found)<br><small>请将图片放在: ${imagePath}</small></span>';">
            `;
        } else {
            imageSlot.innerHTML = `<span>🖼️ ${label} — 图片位置 (PNG)</span>`;
        }
    }

    function buildDiss(di,full){
        if(!di||!di.length)return'';
        let cn='<div class="dissect-line">🧩 中文：';
        di.forEach((p,i)=>{
            if(i>0)cn+='<span class="plus-sign"> + </span>';
            cn+=`<span class="char-piece">${p.c} <small>(${cnMap[p.c]||p.c})</small></span>`;
        });
        cn+=`<span class="arrow-sign"> = </span><span class="result-word">${full}</span></div>`;
        let en='<div class="dissect-line en-line">🔤 English: ';
        di.forEach((p,i)=>{
            if(i>0)en+=' + ';
            en+=`<strong>${p.c}</strong> (${p.e})`;
        });
        en+=` = <strong>${full}</strong></div>`;
        return `<div class="puzzle-box">${cn}${en}</div>`;
    }

    function render(cat){
        const f=cat==='all'?dataset:dataset.filter(d=>d.cat===cat);
        if(!f.length){tbl.innerHTML='<p style="padding:2rem;text-align:center;">✨ 暂无数据</p>';return;}
        let h=`<div class="table-wrapper"><table><thead><tr><th>中文 & Pinyin</th><th>English</th><th>定义 / Definition & 例句</th></tr></thead><tbody>`;
        f.forEach(item=>{
            h+=`<tr><td class="chinese-cell">${item.ch}<span class="pinyin-sm">${item.py}</span></td><td class="english-name">${item.en}</td><td><span style="font-weight:600;">${item.def}</span><br><span style="color:#8b6f5e;">${item.defEn}</span><br><span class="example-text">📝 ${item.ex}</span></td></tr>`;
            if(item.di&&item.di.length)h+=`<tr style="background:#fffdf7;"><td colspan="3">${buildDiss(item.di,item.ch)}</td></tr>`;
        });
        h+='</tbody></table></div>';tbl.innerHTML=h;
    }

    function renderGal(){
        const ex=dataset.filter(d=>d.di&&d.di.length>=2).slice(0,12);
        let h='';ex.forEach(item=>{h+=`<div style="background:#faf3e8;padding:0.6rem 1rem;border-radius:1.2rem;margin-bottom:0.4rem;">${buildDiss(item.di,item.ch)}</div>`;});
        gal.innerHTML=h||'<p>🔍 拆解更多词汇可见上方表格。</p>';
    }

    // Single click handler - no duplicate!
    document.querySelectorAll('.cat-btn').forEach(btn=>{
        btn.addEventListener('click',(e)=>{
            document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
            e.currentTarget.classList.add('active');
            const cat=e.currentTarget.dataset.category;
            updateCategoryImage(cat);
            render(cat);
        });
    });

    // Initial render
    updateCategoryImage('all');
    render('all');
    renderGal();

})();
</script>
</body>
</html>
